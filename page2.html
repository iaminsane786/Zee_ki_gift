<!DOCTYPE html>
<html>
<head>
    <title>Page 2 💜</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            overflow: hidden;
        }

        /* 🔥 START BOX */
        .box {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
            background: black;
            color: white;
        }

        p {
            font-weight: bold;
            font-size: 22px; /* 🔥 bigger */
        }

        .timer {
            margin-top: 15px;
            font-size: 36px; /* 🔥 bigger */
            font-weight: bold;
        }

        /* 🎥 VIDEO */
        #videoBox {
            display: none;
            width: 95%;
            max-width: 500px;
            text-align: center;
        }

        video {
            width: 100%;
            border: 2px solid white;
        }

        /* ⏭ SKIP */
        .skip {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.8);
            border: 2px solid red;
            color: red;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: none;
        }

        /* ⚫ BLACK POPUP */
        .popupBlack {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            height: 200px;
            background: black;
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            font-size: 20px; /* 🔥 bigger */
        }

        /* ⚪ WHITE POPUP */
        .popupWhite {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            height: 200px;
            background: white;
            color: black;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

        .popupBlack button {
            margin-top: 12px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="skip" id="skipBtn" onclick="goNext()">SKIP</div>

<!-- START -->
<div class="box" id="startBox">
    <p>Chalo me tumhe pehle thoda hasaun 😄</p>
    <div class="timer" id="timer">5</div>
</div>

<!-- VIDEO -->
<div id="videoBox">
    <video id="video">
        <source src="video2.mp4" type="video/mp4">
    </video>
</div>

<!-- BLACK POPUP -->
<div class="popupBlack" id="popupBlack">
    <div>hase ya nahi</div>
    <button onclick="goNext()">CLICK HAN</button>
    <button onclick="showWhite()">CLICK NHI</button>
</div>

<!-- WHITE POPUP -->
<div class="popupWhite" id="popupWhite">
    Koi baat nhi🥲
</div>

<script>
    let time = 5;

    let countdown = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time;

        if (time === 0) {
            clearInterval(countdown);

            document.getElementById("startBox").style.display = "none";

            document.body.style.background = "black";

            document.getElementById("videoBox").style.display = "block";
            document.getElementById("skipBtn").style.display = "block";

            let video = document.getElementById("video");
            video.currentTime = 0;
            video.play();
        }
    }, 1000);

    document.getElementById("video").addEventListener("ended", () => {
        document.getElementById("popupBlack").style.display = "flex";
    });

    function goNext() {
        window.location.href = "page3.html";
    }

    function showWhite() {
        document.getElementById("popupBlack").style.display = "none";

        let white = document.getElementById("popupWhite");
        white.style.display = "flex";

        setTimeout(() => {
            window.location.href = "page3.html";
        }, 1500);
    }
</script>

</body>
</html>
