<!DOCTYPE html>
<html>
<head>
    <title>Page 2 💜</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            overflow: hidden;
        }

        /* Center Box */
        .box {
            width: 350px;
            padding: 25px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            border: 2px solid black;
        }

        p {
            font-weight: bold;
        }

        /* Timer */
        .timer {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        /* Video */
        #videoBox {
            display: none;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Skip Button */
        .skip {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.6);
            border: 2px solid red;
            color: red;
            cursor: pointer;
            font-weight: bold;
        }

        /* Black Popup */
        .popupBlack {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 200px;
            background: black;
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
        }

        /* White Popup */
        .popupWhite {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 200px;
            background: white;
            color: black;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
        }

        .popupBlack button {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- SKIP -->
<div class="skip" onclick="goNext()">SKIP</div>

<!-- Start Box -->
<div class="box" id="startBox">
    <p>Chalo me tumhe pehle thoda hasaun 😄</p>
    <div class="timer" id="timer">5</div>
</div>

<!-- Video -->
<div id="videoBox">
    <video id="video" autoplay>
        <source src="video2.mp4" type="video/mp4">
    </video>
</div>

<!-- Black Popup -->
<div class="popupBlack" id="popupBlack">
    <div>hase ya nahi</div>
    <button onclick="goNext()">CLICK HAN</button>
    <button onclick="showWhite()">CLICK NHI</button>
</div>

<!-- White Popup -->
<div class="popupWhite" id="popupWhite">
    Koi baat nhi🥲
</div>

<script>
    let time = 5;

    let countdown = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time;

        if (time === 0) {
            clearInterval(countdown);

            // hide box
            document.getElementById("startBox").style.display = "none";

            // show video
            document.getElementById("videoBox").style.display = "block";
        }
    }, 1000);

    // Video end event
    document.getElementById("video").addEventListener("ended", () => {
        document.getElementById("popupBlack").style.display = "flex";
    });

    function goNext() {
        window.location.href = "page3.html";
    }

    function showWhite() {
        document.getElementById("popupBlack").style.display = "none";

        let white = document.getElementById("popupWhite");
        white.style.display = "flex";

        setTimeout(() => {
            window.location.href = "page3.html";
        }, 2500);
    }
</script>

</body>
</html>
