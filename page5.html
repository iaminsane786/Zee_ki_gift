<!DOCTYPE html>
<html>
<head>
    <title>Page 5 💜</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: url("bg5.jpg") no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
        }

        .title {
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 18px;
            color: black;
        }

        .btn {
            display: block;
            margin: 8px auto;
            width: 230px;
            height: 46px;
            background: transparent;
            border: 2px solid;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .teal {
            border-color: teal;
            color: teal;
        }

        .sky {
            border-color: #00bfff;
            color: #00bfff;
        }

        .lavender {
            border-color: #b57edc;
            color: #b57edc;
        }

        .next {
            margin-top: 58px;
            border: 2px solid green;
            color: green;
            width: 85px;
            height: 30px;
            font-size: 8px;
        }

        .moving-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        .m1 { animation: bounce1 3.2s infinite alternate linear; }
        .m2 { animation: bounce2 3.6s infinite alternate linear; }
        .m3 { animation: bounce3 3.4s infinite alternate linear; }
        .m4 { animation: bounce4 3.8s infinite alternate linear; }
        .m5 { animation: bounce5 3.3s infinite alternate linear; }
        .m6 { animation: bounce6 3.7s infinite alternate linear; }

        @keyframes bounce1 {
            0%   { transform: translate(-50%, -50%) translate(-16px, -6px); }
            50%  { transform: translate(-50%, -50%) translate(16px, 6px); }
            100% { transform: translate(-50%, -50%) translate(-16px, -6px); }
        }
        @keyframes bounce2 {
            0%   { transform: translate(-50%, -50%) translate(12px, 8px); }
            50%  { transform: translate(-50%, -50%) translate(-12px, -8px); }
            100% { transform: translate(-50%, -50%) translate(12px, 8px); }
        }
        @keyframes bounce3 {
            0%   { transform: translate(-50%, -50%) translate(-10px, 7px); }
            50%  { transform: translate(-50%, -50%) translate(10px, -7px); }
            100% { transform: translate(-50%, -50%) translate(-10px, 7px); }
        }
        @keyframes bounce4 {
            0%   { transform: translate(-50%, -50%) translate(14px, -7px); }
            50%  { transform: translate(-50%, -50%) translate(-14px, 7px); }
            100% { transform: translate(-50%, -50%) translate(14px, -7px); }
        }
        @keyframes bounce5 {
            0%   { transform: translate(-50%, -50%) translate(-13px, -5px); }
            50%  { transform: translate(-50%, -50%) translate(13px, 5px); }
            100% { transform: translate(-50%, -50%) translate(-13px, -5px); }
        }
        @keyframes bounce6 {
            0%   { transform: translate(-50%, -50%) translate(10px, 6px); }
            50%  { transform: translate(-50%, -50%) translate(-10px, -6px); }
            100% { transform: translate(-50%, -50%) translate(10px, 6px); }
        }

        .video-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }

        video {
            width: 90%;
            max-width: 500px;
            display: block;
        }

        .skip {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border: 2px solid red;
            color: red;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            font-weight: bold;
            z-index: 22;
        }

        .choice {
            display: none;
            position: absolute;
            inset: 0;
            justify-content: center;
            align-items: center;
            z-index: 25;
        }

        .choice-box {
            background: rgba(255,255,255,0.12);
            border: 2px solid white;
            padding: 18px;
            text-align: center;
            color: white;
        }

        .choice-title {
            font-weight: bold;
            margin-bottom: 12px;
            color: white;
        }

        .choice button {
            display: block;
            margin: 8px auto;
            padding: 10px 14px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .btn {
                width: 210px;
                height: 44px;
            }

            .next {
                width: 78px;
                height: 28px;
                font-size: 7px;
            }

            .title {
                font-size: 15px;
            }

            .choice-box {
                width: 82vw;
            }
        }
    </style>
</head>

<body>

<audio id="bgAudio" autoplay loop>
    <source src="audio5.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainBtns">

    <div class="title">
        𝕄𝕌𝕁𝔼 𝕄𝔸𝕌𝕂𝔸 𝔻𝕆 𝔸ℙ𝕂𝕀 𝕋𝔸ℝ𝔼𝔼𝔽 𝕂ℝℕ𝔼 𝕂𝔸 💐
    </div>

    <button class="btn teal"><span class="moving-text m1">TAREEF NO. 1</span></button>
    <button class="btn teal"><span class="moving-text m2">TAREEF NO. 2</span></button>

    <button class="btn sky"><span class="moving-text m3">TAREEF NO. 3</span></button>
    <button class="btn sky"><span class="moving-text m4">TAREEF NO. 4</span></button>

    <button class="btn lavender"><span class="moving-text m5">TAREEF NO. 5</span></button>
    <button class="btn lavender"><span class="moving-text m6">TAREEF NO. 6</span></button>

    <button class="btn next" onclick="goNext()">NEXT PAGE</button>
</div>

<div class="video-screen" id="videoScreen">
    <div class="skip" id="skipBtn" onclick="skipVideo()">SKIP</div>

    <video id="videoPlayer" playsinline></video>

    <div class="choice" id="choiceBtns">
        <div class="choice-box">
            <div class="choice-title">PLEASE SELECT</div>
            <button onclick="more()">Aur Tareef Sunna Chahti Hun</button>
            <button onclick="enough()">Itna Tareef Kaafi Hai</button>
        </div>
    </div>
</div>

<script>
    const bg = document.getElementById("bgAudio");
    const video = document.getElementById("videoPlayer");
    const screen = document.getElementById("videoScreen");
    const main = document.getElementById("mainBtns");
    const choice = document.getElementById("choiceBtns");
    const skipBtn = document.getElementById("skipBtn");

    const buttons = document.querySelectorAll(".btn:not(.next)");

    buttons.forEach((btn, index) => {
        btn.onclick = () => playVideo(index + 1);
    });

    function stopVideo() {
        video.pause();
        video.currentTime = 0;
        video.removeAttribute("src");
        video.load();
    }

    function showChoice() {
        video.style.display = "none";
        skipBtn.style.display = "none";
        choice.style.display = "flex";
    }

    function hideChoice() {
        choice.style.display = "none";
        video.style.display = "block";
        skipBtn.style.display = "block";
    }

    function playVideo(num) {
        bg.pause();
        bg.currentTime = 0;

        main.style.display = "none";
        screen.style.display = "flex";
        hideChoice();

        video.src = "video5-" + num + ".mp4";
        video.currentTime = 0;
        video.play().catch(() => {});
    }

    video.onended = function () {
        showChoice();
    };

    function skipVideo() {
        stopVideo();
        showChoice();
    }

    function more() {
        stopVideo();
        screen.style.display = "none";
        main.style.display = "block";
        hideChoice();

        bg.currentTime = 0;
        bg.play().catch(() => {});
    }

    function enough() {
        stopVideo();
        bg.pause();
        bg.currentTime = 0;
        window.location.href = "page6.html";
    }

    function goNext() {
        stopVideo();
        bg.pause();
        bg.currentTime = 0;
        window.location.href = "page6.html";
    }
</script>

</body>
</html>
